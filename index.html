<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Morning Digest — Santiago Arango</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 32px 16px;
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 1px solid #1e2535;
    }

    .logo-area h1 {
      font-size: 1.3rem;
      font-weight: 700;
      color: #f8fafc;
      letter-spacing: -0.3px;
    }

    .logo-area p {
      font-size: 0.78rem;
      color: #64748b;
      margin-top: 3px;
    }

    .meta {
      text-align: right;
      font-size: 0.75rem;
      color: #64748b;
    }

    .meta .date {
      font-size: 0.9rem;
      font-weight: 600;
      color: #94a3b8;
      margin-bottom: 4px;
    }

    .stats {
      display: flex;
      gap: 12px;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }

    .stat-card {
      background: #161b27;
      border: 1px solid #1e2535;
      border-radius: 10px;
      padding: 14px 20px;
      flex: 1;
      min-width: 120px;
    }

    .stat-card .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #64748b;
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-size: 1.6rem;
      font-weight: 700;
      color: #f1f5f9;
    }

    .stat-card.urgent .value { color: #f87171; }
    .stat-card.clear .value { color: #34d399; }

    .digest-card {
      background: #161b27;
      border: 1px solid #1e2535;
      border-radius: 12px;
      padding: 28px 32px;
      line-height: 1.7;
    }

    .digest-card h1 {
      font-size: 1.25rem;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 24px;
      padding-bottom: 14px;
      border-bottom: 1px solid #1e2535;
    }

    .digest-card h2 {
      font-size: 1rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-top: 24px;
      margin-bottom: 12px;
    }

    .digest-card p {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .digest-card ul, .digest-card ol {
      padding-left: 20px;
      margin-bottom: 12px;
    }

    .digest-card li {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .digest-card strong { color: #e2e8f0; }

    .digest-card hr {
      border: none;
      border-top: 1px solid #1e2535;
      margin: 20px 0;
    }

    .loading {
      text-align: center;
      padding: 60px 0;
      color: #64748b;
      font-size: 0.9rem;
    }

    .loading .spinner {
      width: 32px;
      height: 32px;
      border: 2px solid #1e2535;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error {
      text-align: center;
      padding: 40px;
      color: #f87171;
      font-size: 0.85rem;
    }

    .refresh-btn {
      background: none;
      border: 1px solid #1e2535;
      color: #94a3b8;
      padding: 6px 14px;
      border-radius: 6px;
      font-size: 0.75rem;
      cursor: pointer;
      transition: all 0.15s;
    }

    .refresh-btn:hover {
      background: #1e2535;
      color: #e2e8f0;
    }

    footer {
      margin-top: 28px;
      text-align: center;
      font-size: 0.72rem;
      color: #334155;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo-area">
        <h1>🌅 Morning Digest</h1>
        <p>Santiago Arango · Lisinski Law Firm</p>
      </div>
      <div class="meta">
        <div class="date" id="digest-date">—</div>
        <div id="last-updated">Loading…</div>
        <button class="refresh-btn" onclick="loadDigest()" style="margin-top:8px">↻ Refresh</button>
      </div>
        <a href="eod-summaries/latest.html" style="
      display:inline-flex; align-items:center; gap:6px;
      background:#1e2535; border:1px solid #2d3748;
      color:#94a3b8; text-decoration:none;
      font-size:0.78rem; font-weight:600;
      padding:7px 14px; border-radius:8px;
      transition:background 0.15s, color 0.15s;
      white-space:nowrap;
    " onmouseover="this.style.background='#2d3748';this.style.color='#e2e8f0'"
       onmouseout="this.style.background='#1e2535';this.style.color='#94a3b8'">
      &#128203; EOD Summary
    </a>
  </header>

    <div class="stats" id="stats" style="display:none">
      <div class="stat-card">
        <div class="label">📬 Emails</div>
        <div class="value" id="stat-emails">—</div>
      </div>
      <div class="stat-card">
        <div class="label">📅 Meetings</div>
        <div class="value" id="stat-meetings">—</div>
      </div>
      <div class="stat-card" id="stat-urgent-card">
        <div class="label">⚡ Urgent</div>
        <div class="value" id="stat-urgent">—</div>
      </div>
    </div>

    <div class="digest-card" id="digest-content">
      <div class="loading">
        <div class="spinner"></div>
        Fetching your digest…
      </div>
    </div>

    <footer>Auto-generated by Madison · Lisinski Law Firm · Powered by Cowork</footer>
  </div>

  <script>
    async function loadDigest() {
      const contentEl = document.getElementById('digest-content');
      const statsEl = document.getElementById('stats');
      contentEl.innerHTML = '<div class="loading"><div class="spinner"></div>Fetching your digest…</div>';
      statsEl.style.display = 'none';

      try {
        const cacheBust = `?t=${Date.now()}`;
        const res = await fetch(`data/digest.json${cacheBust}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // Stats
        document.getElementById('stat-emails').textContent = data.emailCount ?? '—';
        document.getElementById('stat-meetings').textContent = data.meetingCount ?? '—';

        const urgentEl = document.getElementById('stat-urgent');
        const urgentCard = document.getElementById('stat-urgent-card');
        if (data.hasUrgent) {
          urgentEl.textContent = 'Yes';
          urgentCard.classList.add('urgent');
          urgentCard.classList.remove('clear');
        } else {
          urgentEl.textContent = 'Clear';
          urgentCard.classList.add('clear');
          urgentCard.classList.remove('urgent');
        }
        statsEl.style.display = 'flex';

        // Date & last updated
        if (data.date) {
          const d = new Date(data.date);
          document.getElementById('digest-date').textContent = d.toLocaleDateString('en-US', {
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
          });
        }
        if (data.lastUpdated) {
          const u = new Date(data.lastUpdated);
          document.getElementById('last-updated').textContent =
            'Updated ' + u.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        }

        // Digest markdown
        if (data.digestMarkdown) {
          contentEl.innerHTML = marked.parse(data.digestMarkdown);
        } else {
          contentEl.innerHTML = '<div class="error">No digest content found.</div>';
        }
      } catch (err) {
        contentEl.innerHTML = `<div class="error">Could not load digest.<br><small>${err.message}</small></div>`;
      }
    }

    loadDigest();
  </script>
</body>
</html>
